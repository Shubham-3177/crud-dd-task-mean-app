name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t shubham3177/crud-dd-task-mean-app-backend:latest ./backend
          docker push shubham3177/crud-dd-task-mean-app-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t shubham3177/crud-dd-task-mean-app-frontend:latest ./frontend
          docker push shubham3177/crud-dd-task-mean-app-frontend:latest